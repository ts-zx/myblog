# Cloudflare Workers / Pages 配置
# 本地调试: npm run worker:dev
# 部署:     npm run worker:deploy
#
# KV namespace 创建步骤:
#   1. npx wrangler kv namespace create VIEWS
#   2. 把输出的 id 填到下面
#   3. npx wrangler kv namespace create VIEWS --preview  (可选,本地预览)

name = "my-blog"
compatibility_date = "2024-09-23"
pages_build_output_dir = "./out"

# Production KV binding
[[kv_namespaces]]
binding = "VIEWS"
id = "REPLACE_WITH_YOUR_KV_ID"

# Preview KV binding (本地 dev 用)
[[kv_namespaces]]
binding = "VIEWS"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_ID"
